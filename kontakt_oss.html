<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Kontakt oss</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="header"></div>

  <h2>Kontakt oss</h2>

  <table>
    <tr>
      <th>Avdeling</th>
      <th>E-post</th>
      <th>Telefon</th>
    </tr>
    <tr>
      <td>Kundeservice</td>
      <td>kundeservice@iphone.no</td>
      <td>123 45 678</td>
    </tr>
    <tr>
      <td>Support</td>
      <td>support@iphone.no</td>
      <td>987 65 432</td>
    </tr>
  </table>
  <h3>Send oss en melding</h3>

<form class="contact-form">
  <input type="text" name="name" placeholder="Navn" required>
  <input type="email" name="email" placeholder="E-post" required>
  <textarea name="message" rows="5" placeholder="Skriv meldingen din her…" required></textarea>
  <button type="submit">Send melding</button>
</form>


  <div id="footer"></div>
  <script src="script.js"></script>
</body>
</html>

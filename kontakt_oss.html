<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Kontakt oss</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="header"></div>

  <h2 id="contactUs"></h2>

  <table>
    <tr>
      <th id="department"></th>
      <th id="email"></th>
      <th id="phone"></th>
    </tr>
    <tr>
      <td id="customerService"></td>
      <td>kundeservice@iphone.no</td>
      <td>123 45 678</td>
    </tr>
    <tr>
      <td id="support"></td>
      <td>support@iphone.no</td>
      <td>987 65 432</td>
    </tr>
  </table>
  <h3 id="sendMsg"></h3>

<form class="contact-form">
  <input type="text" name="name" placeholder="Navn" required>
  <input type="email" name="email" placeholder="E-post" required>
  <textarea name="message" rows="5" placeholder="Skriv meldingen din her…" required></textarea>
  <button id="sendMsg" type="submit"></button>
</form>

  <div class="success-box" id="successBox">
    <div class="success-content">
      <p id="successMsg"></p>
      <button id="close "onclick="closeBox()"></button>
    </div>
  </div>


  <div id="footer"></div>
  <script src="script.js"></script>
</body>
</html>

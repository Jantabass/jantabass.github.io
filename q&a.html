    <h1> Spørsmål og svar</h1>
    <div class="qa">
  <button class="qa-question">Hvilken iPhone passer meg best?</button>
  <div class="qa-answer">
    <p>Det avhenger av budsjett, bruk og behov. Sammenlikn modellene for riktig valg.</p>
  </div>

  <button class="qa-question">Er nyeste iPhone alltid best?</button>
  <div class="qa-answer">
    <p>Nei. Eldre modeller kan være mer enn gode nok for de fleste.</p>
  </div>

  <button class="qa-question">Hvor lenge varer en iPhone?</button>
  <div class="qa-answer">
    <p>Som regel 3–5 år med god ytelse og oppdateringer.</p>
  </div>
